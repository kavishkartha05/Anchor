name: Claim Follow-Up

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  enforce-claim-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Follow up and auto-unclaim inactive issues
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = "<!-- claim-followup -->";
            const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;
            const oneDayMs = 24 * 60 * 60 * 1000;
            const now = Date.now();

            async function removeLabel(issueNumber, name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "status: in-progress",
              per_page: 100,
            });

            for (const issue of issues) {
              if (issue.pull_request) {
                continue;
              }

              const issueNumber = issue.number;
              const assignees = (issue.assignees || []).map((assignee) => assignee.login);
              const assigneeSet = new Set(assignees.map((login) => login.toLowerCase()));
              const labels = new Set((issue.labels || []).map((label) => label.name));
              const awaitingResponse = labels.has("status: awaiting-claimer-response");

              if (!assignees.length) {
                await removeLabel(issueNumber, "status: in-progress");
                await removeLabel(issueNumber, "status: awaiting-claimer-response");
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: ["status: ready-for-work"],
                });
                continue;
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              const contributorComments = comments.filter((comment) =>
                assigneeSet.has((comment.user?.login || "").toLowerCase())
              );
              const followups = comments.filter((comment) => (comment.body || "").includes(marker));

              let lastContributorActivity = 0;
              for (const comment of contributorComments) {
                const ts = Date.parse(comment.created_at);
                if (ts > lastContributorActivity) {
                  lastContributorActivity = ts;
                }
              }

              if (
                assigneeSet.has((issue.user?.login || "").toLowerCase()) &&
                Date.parse(issue.created_at) > lastContributorActivity
              ) {
                lastContributorActivity = Date.parse(issue.created_at);
              }

              if (!lastContributorActivity) {
                lastContributorActivity = Date.parse(issue.updated_at);
              }

              const latestFollowup = followups
                .map((comment) => ({ id: comment.id, createdAt: Date.parse(comment.created_at) }))
                .sort((a, b) => b.createdAt - a.createdAt)[0];

              if (awaitingResponse) {
                if (!latestFollowup) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    body: `${marker}\n\n${assignees.map((login) => `@${login}`).join(" ")} please confirm within 24 hours that you're still working on this issue, or it will be unclaimed automatically.`,
                  });
                  continue;
                }

                const respondedAfterFollowup = contributorComments.some(
                  (comment) => Date.parse(comment.created_at) > latestFollowup.createdAt
                );

                if (respondedAfterFollowup) {
                  await removeLabel(issueNumber, "status: awaiting-claimer-response");
                  continue;
                }

                if (now - latestFollowup.createdAt >= oneDayMs) {
                  await github.rest.issues.removeAssignees({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    assignees,
                  });
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    labels: ["status: ready-for-work"],
                  });
                  await removeLabel(issueNumber, "status: in-progress");
                  await removeLabel(issueNumber, "status: awaiting-claimer-response");
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    body: `${marker}\n\nNo response was received within 24 hours, so this issue has been unclaimed and returned to \`status: ready-for-work\`.`,
                  });
                }

                continue;
              }

              if (now - lastContributorActivity >= sevenDaysMs) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: ["status: awaiting-claimer-response"],
                });
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `${marker}\n\n${assignees.map((login) => `@${login}`).join(" ")} there has been no claimer activity for 7 days. Please reply within 24 hours if you're still working on this issue.`,
                });
              }
            }
