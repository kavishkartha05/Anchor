name: Stale

on:
  schedule:
    - cron: "0 16 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: "This issue has been quiet for a while. If it is still relevant, add context and it will stay open."
          stale-pr-message: "This pull request has been quiet for a while. If work is still active, leave a note and it will stay open."
          close-issue-message: "Closing due to prolonged inactivity. It can be reopened with fresh context."
          close-pr-message: "Closing due to prolonged inactivity. It can be reopened when the work is ready to continue."
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: "status: stale"
          stale-pr-label: "status: stale"
          exempt-issue-labels: "kind: feature"
