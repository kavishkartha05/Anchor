name: Project task
description: Propose a project task, infrastructure change, or roadmap item.
title: "[task] "
labels:
  - "kind: maintenance"
  - "status: needs-triage"
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched open and closed issues and pull requests and did not find a duplicate.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Pick the closest part of the project so automation can route triage correctly.
      options:
        - Automation
        - Docs
        - Source
        - Tests
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should this task accomplish?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: How will maintainers know this task is complete?
    validations:
      required: true
