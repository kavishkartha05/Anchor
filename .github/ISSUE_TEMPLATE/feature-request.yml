name: Feature request
description: Suggest a user-facing feature or workflow improvement.
title: "[feature] "
labels:
  - "kind: feature"
  - "status: needs-triage"
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched open and closed issues and pull requests and did not find a duplicate.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Pick the closest part of the project so automation can route triage correctly.
      options:
        - Automation
        - Docs
        - Source
        - Tests
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should the project solve?
      placeholder: Today the workflow is painful because...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the outcome you want, not only the implementation.
      placeholder: The project should let users...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add screenshots, examples, competing workflows, or prior discussion if useful.
